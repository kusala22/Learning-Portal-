version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: gvcc_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gvcc_learning_portal
    networks:
      - gvcc_network

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gvcc_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/gvcc_learning_portal
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey_change_in_production}
      - JWT_EXPIRE=30d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - gvcc_network

  # Frontend React App
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: gvcc_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - gvcc_network

volumes:
  mongodb_data:

networks:
  gvcc_network:
    driver: bridge
